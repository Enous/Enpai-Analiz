<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Enpai-Dev Analiz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Particles.js CDN for Snow Animation -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="title-bar">
        <span>ENPAI-DEV ANALİZ</span>
        <button id="close-btn">×</button>
    </div>

    <div class="container">
        <header>
            <h1 class="glow-text">ENPAI-DEV ANALİZ</h1>
            <p class="subtitle">Nano Banana Smart Organizer</p>
        </header>

        <div class="card path-section">
            <div class="input-group">
                <label>KAYNAK</label>
                <div class="row">
                    <input type="text" id="src-path" placeholder="Klasör seçin...">
                    <button class="btn-small" id="browse-src">SEÇ</button>
                </div>
            </div>
            <div class="input-group">
                <label>HEDEF</label>
                <div class="row">
                    <input type="text" id="dst-path" placeholder="Klasör seçin...">
                    <button class="btn-small" id="browse-dst">SEÇ</button>
                </div>
            </div>
        </div>

        <div class="op-toggle">
            <label class="radio">
                <input type="radio" name="op" value="move" checked>
                <span class="check"></span> Taşı
            </label>
            <label class="radio">
                <input type="radio" name="op" value="copy">
                <span class="check"></span> Kopyala
            </label>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <span id="progress-text">0%</span>
        </div>

        <div class="file-list-card">
            <h3>ANALİZ EDİLEN DOSYALAR</h3>
            <div id="file-list" class="scrollable">
                <div class="placeholder">Henüz analiz yapılmadı.</div>
            </div>
        </div>

        <div class="actions">
            <button id="scan-btn" class="btn-primary">DOSYALARI ANALİZ ET</button>
            <button id="process-btn" class="btn-success" disabled>ONAYLA VE BAŞLAT</button>
        </div>
    </div>

    <script src="renderer.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 150, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1, "direction": "bottom", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "bubble" }, "onclick": { "enable": false }, "resize": true },
                "modes": { "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 1, "speed": 3 } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
